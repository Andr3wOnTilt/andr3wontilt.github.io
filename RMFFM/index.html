<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMF FM — Official Live Player</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg-dark:#0d111b;
    --bg-bar:linear-gradient(90deg,#141c2f,#1b2137,#1f1b30);
    --glass:rgba(255,255,255,0.05);
    --text-main:#ffffff;
    --text-soft:#9aa4c7;
    --accent:#ffd200;
    --live:#ff3b3b;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
    background:var(--bg-dark);
    min-height:200vh;
}

/* FOOTER PLAYER */
.player{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:110px;
    background:var(--bg-bar);
    backdrop-filter:blur(20px);
    border-top:1px solid rgba(255,255,255,0.06);
    display:flex;
    align-items:center;
    padding:0 35px;
    box-shadow:0 -15px 40px rgba(0,0,0,0.6);
    z-index:9999;
}

/* LEFT */
.left{
    display:flex;
    align-items:center;
    gap:18px;
    min-width:320px;
}

.logo{
    width:70px;
    height:70px;
    border-radius:14px;
    background:url("RMFFM_logo.png") center/contain no-repeat;
    background-color:#111;
}

.info{
    display:flex;
    flex-direction:column;
}

.station{
    font-weight:700;
    font-size:16px;
    color:var(--text-main);
}

.meta{
    font-size:13px;
    color:var(--text-soft);
}

.live-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    font-weight:600;
    margin-top:4px;
    color:var(--text-main);
}

.live-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--live);
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}

/* CENTER */
.center{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
}

.controls{
    display:flex;
    align-items:center;
    gap:25px;
}

.control{
    background:none;
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
    opacity:0.8;
    transition:0.2s;
}

.control:hover{
    opacity:1;
    transform:scale(1.1);
}

.play{
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    cursor:pointer;
    border:none;
    transition:0.2s;
}

.play:hover{
    transform:scale(1.08);
}

/* PROGRESS BAR */
.progress-container{
    width:420px;
    height:4px;
    background:rgba(255,255,255,0.2);
    border-radius:4px;
    overflow:hidden;
    position:relative;
}

.progress{
    width:0%;
    height:100%;
    background:var(--accent);
    transition:width 1s linear;
}

/* RIGHT */
.right{
    min-width:300px;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:18px;
}

.stat{
    font-size:12px;
    color:var(--text-soft);
}

.volume-container{
    display:flex;
    align-items:center;
    gap:8px;
}

input[type=range]{
    width:120px;
    appearance:none;
    height:4px;
    background:rgba(255,255,255,0.3);
    border-radius:4px;
}

input[type=range]::-webkit-slider-thumb{
    appearance:none;
    width:12px;
    height:12px;
    border-radius:50%;
    background:white;
    cursor:pointer;
}

@media(max-width:900px){
    .progress-container{display:none;}
    .stat{display:none;}
}
</style>
</head>
<body>

<div class="player">

    <!-- LEFT -->
    <div class="left">
        <div class="logo"></div>
        <div class="info">
            <div class="station">RMF FM — Streaming</div>
            <div class="meta" id="status">In pausa</div>
            <div class="live-badge">
                <div class="live-dot"></div> LIVE BROADCAST
            </div>
        </div>
    </div>

    <!-- CENTER -->
    <div class="center">
        <div class="controls">
            <button class="control">⏮</button>
            <button class="play" id="playBtn">▶</button>
            <button class="control">⏭</button>
        </div>
        <div class="progress-container">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="stat" id="time">00:00</div>
        <div class="stat">MP3 • 128kbps</div>
        <div class="volume-container">
            🔊
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
        </div>
    </div>

</div>

<script>
const audio = new Audio("http://217.74.72.11:8000/rmf_fm");
audio.volume = 0.8;

const playBtn = document.getElementById("playBtn");
const status = document.getElementById("status");
const volume = document.getElementById("volume");
const progress = document.getElementById("progress");
const timeDisplay = document.getElementById("time");

let playing = false;
let seconds = 0;

function formatTime(sec){
    const m = Math.floor(sec/60).toString().padStart(2,'0');
    const s = (sec%60).toString().padStart(2,'0');
    return `${m}:${s}`;
}

setInterval(()=>{
    if(playing){
        seconds++;
        timeDisplay.textContent = formatTime(seconds);
        progress.style.width = (seconds % 100) + "%";
    }
},1000);

playBtn.addEventListener("click",()=>{
    if(!playing){
        audio.play().then(()=>{
            playing = true;
            playBtn.textContent="⏸";
            status.textContent="In riproduzione";
        }).catch(()=>{
            status.textContent="Errore riproduzione";
        });
    }else{
        audio.pause();
        playing = false;
        playBtn.textContent="▶";
        status.textContent="In pausa";
    }
});

volume.addEventListener("input",()=>{
    audio.volume = volume.value;
});
</script>

</body>
</html>
